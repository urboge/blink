<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JH6J9DNLD3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-JH6J9DNLD3');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blink</title>
  <link rel="stylesheet" href="blink.css">
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <div id="splash-logo">
      <div id="splash-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
      </div>
      <span id="splash-wordmark">Blink</span>
    </div>
    <div id="splash-tagline">Messages that disappear.</div>
  </div>

  <!-- APP -->
  <div id="app">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebar-header">
        <h1>Blink</h1>
        <button id="new-contact-btn" title="New contact">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="16" y1="11" x2="22" y2="11" />
          </svg>
        </button>
      </div>
      <div id="search-wrap">
        <input id="search" type="text" placeholder="Search">
      </div>
      <div id="my-code-bar" title="Click to copy your code">
        <span>Your code</span>
        <span class="code-val" id="my-code-display">—</span>
        <span class="copy-hint">Copy</span>
      </div>
      <div id="contacts-list"></div>
    </div>

    <!-- CHAT AREA -->
    <div id="chat-area">
      <div id="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        <p>Select a contact to start messaging</p>
      </div>

      <div id="chat-main" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div id="chat-header">
          <button id="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <div class="avatar" id="chat-avatar"></div>
          <div>
            <div id="chat-header-name"></div>
            <div id="chat-header-code"></div>
          </div>
        </div>

        <div id="messages-wrap"></div>

        <div id="input-area">
          <!-- Image URL panel -->
          <div id="image-panel">
            <label>Paste an image URL</label>
            <input type="url" id="image-url-input" placeholder="https://i.imgur.com/example.jpg">
            <button id="image-send-btn">Send Image</button>
          </div>

          <!-- Sticker panel -->
          <div id="sticker-panel">
            <div id="sticker-tabs"></div>
            <div id="sticker-grid"></div>
          </div>

          <!-- Image button -->
          <button class="input-btn" id="image-btn" title="Send image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <polyline points="21 15 16 10 5 21" />
            </svg>
          </button>

          <!-- Sticker button -->
          <button class="input-btn" id="sticker-btn" title="Send sticker">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z" />
              <path d="M8 14s1.5 2 4 2 4-2 4-2" />
              <line x1="9" y1="9" x2="9.01" y2="9" />
              <line x1="15" y1="9" x2="15.01" y2="9" />
            </svg>
          </button>

          <div id="msg-input-wrap">
            <textarea id="msg-input" placeholder="Blink" rows="1"></textarea>
          </div>
          <button id="send-btn" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 4l8 16-8-4-8 4 8-16z" />
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div><!-- /app -->

  <!-- NEW CONTACT MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>New Contact</h2>
      <div>
        <label>Name</label>
        <input type="text" id="contact-name-input" placeholder="e.g. Sarah">
      </div>
      <div>
        <label>Their code</label>
        <input type="text" id="contact-code-input" placeholder="e.g. x7k9m2ab">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-add" id="modal-add">Add</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="blink.js"></script>
</body>

</html>
